<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Status of the projects listed in this repository, read straight from their data files.">
<title>Projects Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400..800&family=Wix+Madefor+Text:wght@400..800&family=JetBrains+Mono:wght@400;600&display=swap">
<style>
  /* The palette, type scale and component vocabulary are shared with the
     sibling docs site, so the two read as one system. Every font has a system
     fallback: if the webfont never arrives, the page still reads. */
  :root {
    --bg: #FAFAF7;
    --ink: #1C2140;
    --ink-soft: #565C7A;
    --blue: #0066FF;
    --blue-deep: #0052CC;
    --blue-soft: #E6F0FF;
    --line: #DEDEE8;
    --card: #FFFFFF;

    --display: 'Wix Madefor Display', system-ui, sans-serif;
    --text: 'Wix Madefor Text', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

    /* Status palette — semantic, not brand. A badge's whole job is to be read
       and understood at a glance, so the colour has to mean the thing (green
       finished, blue moving, yellow paused, orange slipping, red stopped) and
       has to be legible. The brand palette above owes nothing to either job,
       and forcing it here served the logo at the reader's expense: its own
       green-on-green lands at 3.01:1, which no amount of it being the right
       green can fix.

       Each pair's measured contrast is next to it. The floor is 4.5:1 — AA for
       text this size — and nothing here sits on the floor. */
    --done-fg: #166534;        --done-bg: #DCFCE7;        /* 6.49:1 */
    --on-track-fg: #1D4ED8;    --on-track-bg: #DBEAFE;    /* 5.49:1 */
    --on-hold-fg: #854D0E;     --on-hold-bg: #FEF9C3;     /* 6.38:1 */
    --at-risk-fg: #9A3412;     --at-risk-bg: #FFEDD5;     /* 6.38:1 */
    --blocked-fg: #B91C1C;     --blocked-bg: #FEE2E2;     /* 5.30:1 */
    --unknown-fg: #44403C;     --unknown-bg: #EFEFF3;     /* 8.96:1 */

    /* A card that failed to load and a project that is blocked are different
       things, but both are "stopped, look here" — one red, used for both. */
    --error-fg: #B91C1C;       /* 6.47:1 on the card surface */
    --error-line: #F2C0BC;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  /* Any explicit display below would otherwise beat the hidden attribute, and
     the element would sit there empty — which is how the "Data as of" pill
     showed up blank on a page whose manifest never loaded. */
  [hidden] { display: none !important; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--text);
    font-size: 17.5px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3 { font-family: var(--display); font-weight: 700; letter-spacing: -.01em; }
  a { color: var(--blue-deep); }
  :focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; border-radius: 4px; }

  .wrap { max-width: 820px; margin: 0 auto; padding: 0 24px 80px; }

  /* --- Masthead ---------------------------------------------------------- */

  /* Deliberately short. Every pixel the header takes is a project a reader has
     to scroll for, and nobody came here to read the header. */
  .masthead { padding: 36px 0 22px; }

  .kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--blue-deep);
    background: var(--blue-soft);
    padding: 6px 12px;
    border-radius: 999px;
    margin-bottom: 12px;
  }

  .masthead h1 { font-size: clamp(27px, 4vw, 36px); line-height: 1.1; }
  .masthead h1 span { color: var(--blue); }
  .masthead .lede { margin-top: 8px; color: var(--ink-soft); max-width: 620px; font-size: 16px; }

  /* --- Page-level failure ------------------------------------------------ */

  .banner {
    margin-bottom: 24px;
    padding: 18px 22px;
    border: 1px solid var(--error-line);
    border-left: 5px solid var(--error-fg);
    border-radius: 0 12px 12px 0;
    background: var(--card);
    color: var(--error-fg);
  }
  .banner h2 { font-size: 17.5px; margin-bottom: 4px; }
  .banner p { font-size: 15px; }
  .banner code { font-family: var(--mono); font-size: .85em; }

  /* --- The card ---------------------------------------------------------- */

  .board { display: grid; gap: 14px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    border-top: 4px solid var(--line);
    overflow: hidden;
  }
  .card--done     { border-top-color: var(--done-fg); }
  .card--on-track { border-top-color: var(--on-track-fg); }
  .card--on-hold  { border-top-color: var(--on-hold-fg); }
  .card--at-risk  { border-top-color: var(--at-risk-fg); }
  .card--blocked  { border-top-color: var(--blocked-fg); }

  /* The whole face is the toggle. <details> gives keyboard support and a real
     expanded/collapsed state to a screen reader for free — no JS to get wrong. */
  .face {
    display: block;
    padding: 16px 22px;
    cursor: pointer;
    list-style: none;
  }
  .face::-webkit-details-marker { display: none; }
  .face:hover { background: #FCFCFA; }
  .face:focus-visible { outline: 3px solid var(--blue); outline-offset: -3px; }

  /* Name, kind and status share one line: three facts, one glance, one row. */
  .face__top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .face__name { font-size: 19px; line-height: 1.25; }

  .badge {
    flex: none;
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--unknown-bg);
    color: var(--unknown-fg);
    white-space: nowrap;
  }
  .badge--done     { background: var(--done-bg);     color: var(--done-fg); }
  .badge--on-track { background: var(--on-track-bg); color: var(--on-track-fg); }
  .badge--on-hold  { background: var(--on-hold-bg);  color: var(--on-hold-fg); }
  .badge--at-risk  { background: var(--at-risk-bg);  color: var(--at-risk-fg); }
  .badge--blocked  { background: var(--blocked-bg);  color: var(--blocked-fg); }

  .face__type {
    flex: none;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 2px 7px;
    border-radius: 4px;
  }

  .face__summary { margin-top: 6px; color: var(--ink-soft); font-size: 15.5px; max-width: 640px; }

  /* --- Progress ---------------------------------------------------------- */

  .progress { margin-top: 12px; display: flex; align-items: center; gap: 12px; }
  .progress__track {
    flex: 1;
    height: 6px;
    border-radius: 999px;
    background: var(--line);
    overflow: hidden;
  }
  /* Neutral on purpose, and never tinted by status. The bar is a count of
     milestones done; the badge is the writer's judgment. The contract keeps
     those two strictly apart — one is derived, the other is typed and never
     computed — so colouring the bar with the badge's colour would merge, to the
     eye, exactly what the design separates. It also stops the bar from ever
     contradicting the badge: blue means "on track" here, and a blue bar under
     an "on hold" badge said both at once. 4.90:1 against the track. */
  .progress__fill { height: 100%; border-radius: 999px; background: var(--ink-soft); }
  .progress__label {
    flex: none;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }

  /* The open/closed affordance rides in the progress row rather than claiming a
     line of its own. <summary> already announces itself as a disclosure widget
     to a screen reader, so this mark is decoration for the eye only. */
  .face__chev {
    flex: none;
    color: var(--blue-deep);
    font-size: 11px;
    transition: transform .15s ease;
  }
  details[open] .face__chev { transform: rotate(90deg); }

  /* --- The detail -------------------------------------------------------- */

  .body { padding: 4px 24px 24px; border-top: 1px dashed var(--line); margin: 0 24px; }
  .body > .sec:first-child { padding-top: 20px; }

  .sec { padding-bottom: 4px; }
  .sec + .sec { margin-top: 26px; }
  .sec__title { font-size: 15px; margin-bottom: 2px; }
  .sec__note { color: var(--ink-soft); font-size: 13.5px; margin-bottom: 12px; }

  /* Objectives: a flat list, so it reads as one — an arrow per line. */
  .aims { list-style: none; display: grid; gap: 8px; max-width: 640px; }
  .aims li { padding-left: 22px; position: relative; font-size: 16px; }
  .aims li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--blue);
    font-family: var(--mono);
  }

  /* Outcomes: blocks, because each one carries its own evidence. */
  .outs { display: grid; gap: 12px; max-width: 680px; }
  .out {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 18px;
  }
  .out__text { font-size: 16px; }
  .out__ev { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; list-style: none; }
  .out__ev a {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 3px 9px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card);
    color: var(--blue-deep);
    text-decoration: none;
  }
  .out__ev a:hover { border-color: var(--blue); background: var(--blue-soft); }
  .out__ev a::after { content: " ↗"; color: var(--ink-soft); }

  /* Evidence that failed the https check renders as text, never a link. */
  .out__void {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 3px 9px;
    border: 1px dashed var(--line);
    border-radius: 4px;
    color: var(--ink-soft);
  }

  /* Milestones: deliberately NOT the same marker as objectives. These carry a
     state, so the marker is a checklist mark rather than a bullet. */
  .miles { list-style: none; display: grid; gap: 2px; max-width: 680px; }
  .mile { display: flex; align-items: baseline; gap: 10px; padding: 5px 0; font-size: 15.5px; }
  .mile__mark {
    flex: none;
    width: 16px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
  }
  .mile--done .mile__mark { color: var(--done-fg); }
  .mile--in-progress .mile__mark { color: var(--blue); }
  .mile--next .mile__mark { color: var(--line); }
  .mile--next .mile__title { color: var(--ink-soft); }
  .mile__state {
    flex: none;
    margin-left: auto;
    padding-left: 12px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .stamp {
    margin-top: 22px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-soft);
  }

  /* --- Per-card failure -------------------------------------------------- */

  .card--error { border-top-color: var(--error-fg); }
  .card--error .face { cursor: default; }
  .card--error .face__name { font-family: var(--mono); font-size: 15px; color: var(--error-fg); }
  .card__error { margin-top: 8px; color: var(--error-fg); font-size: 15px; max-width: 640px; }

  .empty {
    padding: 40px;
    border: 1px dashed var(--line);
    border-radius: 14px;
    color: var(--ink-soft);
    text-align: center;
  }

  .noscript {
    padding: 18px 22px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
  }

  @media (max-width: 620px) {
    .face { padding: 16px 18px; }
    .body { padding: 4px 18px 20px; margin: 0 18px; }
    /* Narrow: let the row wrap rather than squeeze the name to one word a line. */
    .face__top { flex-wrap: wrap; gap: 8px; }
    .face__name { flex: 1 1 100%; }
    .badge { margin-left: 0; }
    .mile__state { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <span class="kicker" id="as-of" hidden></span>
    <h1>Projects <span>Dashboard</span></h1>
    <p class="lede">Where each project stands, written by the people building them. Open one to see the detail.</p>
  </header>

  <noscript>
    <p class="noscript">This dashboard reads its data with JavaScript. Enable it to see the projects, or read the files in <code>data/</code> directly.</p>
  </noscript>

  <main>
    <div id="banner" hidden></div>
    <div class="board" id="board"></div>
  </main>

</div>

<script>
'use strict';

/**
 * Reads manifest.json, then one data/<slug>.json per project it lists, and draws
 * a card for each. Every fetch is relative to this file, so the page runs
 * unchanged wherever it is served from — a fork's own Pages URL included. There
 * is nothing to configure and nothing to build.
 *
 * Two rules the rest of this file keeps:
 *
 *   1. Text out of JSON reaches the page only through textContent. The data is
 *      hand-edited and the repository is public; innerHTML would let a typo — or
 *      a pull request — execute.
 *   2. A broken data file costs its own card and nothing else. Only the manifest
 *      can take the board down, because without it there is no list to draw.
 */

var STATUS_LABELS = {
  'on track': 'On track',
  'at risk': 'At risk',
  'blocked': 'Blocked',
  'on hold': 'On hold',
  'done': 'Done'
};

var TYPE_LABELS = {
  agent: 'Agent',
  campaign: 'Campaign',
  system: 'System'
};

var MILESTONE_LABELS = {
  done: 'Done',
  'in progress': 'In progress',
  next: 'Next'
};

/* A state, not a bullet — objectives get an arrow, these get a checklist mark. */
var MILESTONE_MARKS = {
  done: '✓',
  'in progress': '◐',
  next: '○'
};

/** Turn "on track" into "on-track" so it can key a CSS modifier. */
function modifier(value) {
  return String(value).toLowerCase().replace(/[^a-z0-9]+/g, '-');
}

function el(tag, className, text) {
  var node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined && text !== null) node.textContent = String(text);
  return node;
}

/**
 * Fetch JSON, relative and cache-busted. Pages sits behind a CDN that will
 * happily serve a stale file for minutes after a push; the query string is what
 * keeps a reader from reading yesterday's status.
 */
function getJson(url) {
  return fetch(url + '?v=' + Date.now(), { cache: 'no-store' }).then(function (res) {
    if (!res.ok) throw new Error('the server answered ' + res.status + ' ' + res.statusText);
    return res.json();
  });
}

/* --- Pieces of a card ---------------------------------------------------- */

function countDone(milestones) {
  return milestones.filter(function (m) { return m.state === 'done'; }).length;
}

function renderProgress(milestones) {
  var total = milestones.length;
  var done = countDone(milestones);
  var percent = total > 0 ? Math.round((done / total) * 100) : 0;

  var wrap = el('div', 'progress');

  var track = el('div', 'progress__track');
  track.setAttribute('role', 'progressbar');
  track.setAttribute('aria-valuemin', '0');
  track.setAttribute('aria-valuemax', '100');
  track.setAttribute('aria-valuenow', String(percent));
  track.setAttribute('aria-label', 'Milestones completed');

  var fill = el('div', 'progress__fill');
  fill.style.width = percent + '%';
  track.appendChild(fill);

  wrap.appendChild(track);
  wrap.appendChild(el('span', 'progress__label', percent + '% · ' + done + '/' + total));

  var chev = el('span', 'face__chev', '▶');
  chev.setAttribute('aria-hidden', 'true');
  wrap.appendChild(chev);
  return wrap;
}

/** A titled block with an optional one-line note under the heading. */
function section(title, note) {
  var sec = el('section', 'sec');
  sec.appendChild(el('h3', 'sec__title', title));
  if (note) sec.appendChild(el('p', 'sec__note', note));
  return sec;
}

function renderObjectives(objectives) {
  var sec = section('What it set out to do', 'The goal, as written before the work started.');
  var ul = el('ul', 'aims');
  objectives.forEach(function (item) { ul.appendChild(el('li', null, item)); });
  sec.appendChild(ul);
  return sec;
}

function renderEvidence(evidence) {
  var ul = el('ul', 'out__ev');
  evidence.forEach(function (item) {
    var li = el('li');
    // The schema already demands https, and CI enforces the schema. This second
    // check is for the copy of the page that is running against data the gate
    // never saw — a local edit, a fork's branch.
    if (typeof item.url === 'string' && item.url.indexOf('https://') === 0) {
      var link = el('a', null, item.label);
      link.href = item.url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      li.appendChild(link);
    } else {
      li.appendChild(el('span', 'out__void', item.label + ' (not a public https link)'));
    }
    ul.appendChild(li);
  });
  return ul;
}

function renderOutcomes(outcomes) {
  var withEvidence = outcomes.filter(function (o) {
    return Array.isArray(o.evidence) && o.evidence.length > 0;
  }).length;
  var note = withEvidence > 0
    ? 'Every link opens the thing itself. No login.'
    : 'None of this is public, so there is nothing to link to.';

  var sec = section('What it produced', note);
  var wrap = el('div', 'outs');
  outcomes.forEach(function (outcome) {
    var block = el('div', 'out');
    block.appendChild(el('p', 'out__text', outcome.text));
    if (Array.isArray(outcome.evidence) && outcome.evidence.length > 0) {
      block.appendChild(renderEvidence(outcome.evidence));
    }
    wrap.appendChild(block);
  });
  sec.appendChild(wrap);
  return sec;
}

/** The timeline. Order is the sequence — the data carries no dates by design. */
function renderMilestones(milestones) {
  var left = milestones.length - countDone(milestones);
  var note = left === 0
    ? 'Every step is done.'
    : left + (left === 1 ? ' step' : ' steps') + ' left. In order — there are no dates, the order is the sequence.';

  var sec = section('The path', note);
  var ul = el('ul', 'miles');
  milestones.forEach(function (m) {
    var li = el('li', 'mile mile--' + modifier(m.state));
    var mark = el('span', 'mile__mark', MILESTONE_MARKS[m.state] || '·');
    mark.setAttribute('aria-hidden', 'true');
    li.appendChild(mark);
    li.appendChild(el('span', 'mile__title', m.title));
    li.appendChild(el('span', 'mile__state', MILESTONE_LABELS[m.state] || m.state));
    ul.appendChild(li);
  });
  sec.appendChild(ul);
  return sec;
}

/* --- Cards --------------------------------------------------------------- */

function renderCard(card) {
  var details = el('details', 'card card--' + modifier(card.status));

  // The whole face is the toggle: collapsed, a reader sees the name, the call,
  // the kind of thing it is, one line of what it is, and how far along it is.
  var face = el('summary', 'face');

  var top = el('div', 'face__top');
  top.appendChild(el('h2', 'face__name', card.name));
  top.appendChild(el('span', 'face__type', TYPE_LABELS[card.type] || card.type));
  top.appendChild(el('span', 'badge badge--' + modifier(card.status),
    STATUS_LABELS[card.status] || card.status));
  face.appendChild(top);

  face.appendChild(el('p', 'face__summary', card.summary));
  face.appendChild(renderProgress(card.milestones));

  details.appendChild(face);

  var body = el('div', 'body');
  body.appendChild(renderObjectives(card.objectives));
  if (Array.isArray(card.outcomes) && card.outcomes.length > 0) {
    body.appendChild(renderOutcomes(card.outcomes));
  }
  body.appendChild(renderMilestones(card.milestones));
  // Only here: a date on the face would read as a freshness verdict the data
  // cannot support.
  body.appendChild(el('p', 'stamp', 'Last reviewed ' + card.last_updated));
  details.appendChild(body);

  return details;
}

function renderCardError(slug, message) {
  var article = el('article', 'card card--error');
  var face = el('div', 'face');
  var top = el('div', 'face__top');
  top.appendChild(el('h2', 'face__name', 'data/' + slug + '.json'));
  top.appendChild(el('span', 'badge', 'Unavailable'));
  face.appendChild(top);
  face.appendChild(el('p', 'card__error',
    'This project could not be loaded — ' + message + '. The other cards on this page are unaffected.'));
  article.appendChild(face);
  return article;
}

function showBanner(message) {
  var banner = document.getElementById('banner');
  banner.className = 'banner';
  banner.setAttribute('role', 'alert');
  banner.appendChild(el('h2', null, 'The dashboard could not load its project list'));
  var detail = el('p');
  detail.appendChild(document.createTextNode('Reading '));
  detail.appendChild(el('code', null, 'manifest.json'));
  detail.appendChild(document.createTextNode(' failed — ' + message + '. Nothing can be shown until it is readable again.'));
  banner.appendChild(detail);
  banner.hidden = false;
}

/** "Data as of" is the newest last_updated across the cards that loaded. */
function showAsOf(dates) {
  if (dates.length === 0) return;
  var latest = dates.slice().sort().pop();
  var node = document.getElementById('as-of');
  node.textContent = 'Data as of ' + latest;
  node.hidden = false;
}

/* --- Boot ---------------------------------------------------------------- */

function main() {
  var board = document.getElementById('board');

  getJson('./manifest.json').then(function (manifest) {
    if (!manifest || !Array.isArray(manifest.projects)) {
      throw new Error('it does not list a "projects" array');
    }
    if (manifest.projects.length === 0) {
      board.appendChild(el('p', 'empty', 'No projects are listed yet.'));
      return;
    }

    // A slot per project, in manifest order, before any data arrives: the cards
    // then fill in place and the page never reorders itself as fetches land.
    var slots = manifest.projects.map(function () {
      var slot = el('div');
      board.appendChild(slot);
      return slot;
    });

    var dates = [];
    var loads = manifest.projects.map(function (slug, i) {
      return getJson('./data/' + slug + '.json').then(function (card) {
        slots[i].appendChild(renderCard(card));
        if (typeof card.last_updated === 'string') dates.push(card.last_updated);
      }).catch(function (err) {
        slots[i].appendChild(renderCardError(slug, err.message));
      });
    });

    return Promise.all(loads).then(function () { showAsOf(dates); });
  }).catch(function (err) {
    showBanner(err.message);
  });
}

main();
</script>
</body>
</html>
